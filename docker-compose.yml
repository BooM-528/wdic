services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-hangkan_db}
      POSTGRES_USER: ${DB_USER:-hangkan_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hangkan_pass}
      TZ: Asia/Bangkok
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT_EXTERNAL:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hangkan_user} -d ${DB_NAME:-hangkan_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend/wdic
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./backend/wdic:/app
      - static_volume:/app/staticfiles
      - ./backend/wdic/media:/app/media
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend/wdic
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    restart: always

volumes:
  pgdata:
  static_volume:
